<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageAttention Benchmark Viewer</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --blue: #58a6ff;
            --green: #3fb950;
            --border: #30363d;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        h1 { color: var(--blue); margin: 0; font-size: 24px; }
        
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        select {
            background: #21262d;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            min-width: 320px;
            outline: none;
            cursor: pointer;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: #238636;
            color: white;
        }

        .data-display {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            overflow-x: auto;
            color: #7ee787;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 14px;
        }

        .info-text { color: #8b949e; font-size: 14px; margin-top: 10px; }
        
        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 SageAttention Benchmark Viewer</h1>
        <nav>
            <a href="https://github.com/Rogala/SageAttention-Benchmark-Viewer" target="_blank">View on GitHub</a>
        </nav>
    </header>

    <div class="panel">
        <h3>Select results from Community Database:</h3>
        <div class="controls">
            <select id="gpu-selector">
                <option value="">Loading community database...</option>
            </select>
            <span id="counter" class="status-badge">Connecting...</span>
        </div>
        <p class="info-text">Fetching data directly from the /results directory of this repository.</p>
    </div>

    <div class="panel">
        <h3>Benchmark Raw Data:</h3>
        <div id="display-area">
            <pre id="json-output" class="data-display">Please select a GPU model from the list above to view benchmark details...</pre>
        </div>
    </div>
</div>

<script>
    // GitHub API Configuration
    const CONFIG = {
        user: "Rogala",
        repo: "SageAttention-Benchmark-Viewer",
        folder: "results"
    };

    const selector = document.getElementById('gpu-selector');
    const counter = document.getElementById('counter');
    const output = document.getElementById('json-output');

    async function loadCommunityData() {
        const url = `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.folder}`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('API Error');
            
            const files = await response.json();
            // Filter JSON files, excluding technical .gitkeep
            const jsonFiles = files.filter(f => f.name.endsWith('.json') && !f.name.startsWith('.'));
            
            selector.innerHTML = '<option value="">-- Choose a GPU Model (e.g. RTX 5060 Ti) --</option>';
            
            jsonFiles.forEach(file => {
                const option = document.createElement('option');
                option.value = file.download_url;
                // Beautify filename: NVIDIA_RTX_5060_Ti -> NVIDIA RTX 5060 Ti
                option.textContent = file.name.replace('.json', '').replace(/_/g, ' ');
                selector.appendChild(option);
            });

            counter.textContent = `Models found: ${jsonFiles.length}`;

        } catch (error) {
            console.error(error);
            selector.innerHTML = '<option value="">Database unavailable</option>';
            counter.style.background = '#da3633';
            counter.textContent = 'API Connection Error';
        }
    }

    selector.addEventListener('change', async (e) => {
        if (!e.target.value) return;
        
        output.textContent = "Fetching file contents...";
        
        try {
            const res = await fetch(e.target.value);
            const data = await res.json();
            
            // Format JSON for a clean look
            output.textContent = JSON.stringify(data, null, 4);
        } catch (err) {
            output.textContent = "Failed to parse JSON data.";
        }
    });

    // Initialize on page load
    loadCommunityData();
</script>

</body>
</html>
